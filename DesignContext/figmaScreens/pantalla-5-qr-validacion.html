<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCart – QR validacion</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8ede8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; padding: 52px 0 20px; }
.screen-tag { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); background: #1a7a58; color: white; font-size: 11px; font-weight: 600; padding: 5px 16px; border-radius: 20px; white-space: nowrap; z-index: 100; }
.phone { width: 360px; height: 720px; background: #1D9E75; border-radius: 44px; border: 2px solid #c8d0c8; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,0.13); }
.statusbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 24px 2px; font-size: 11px; color: rgba(255,255,255,0.85); }
.notch { width: 68px; height: 14px; background: #0d5c40; border-radius: 0 0 10px 10px; margin: 0 auto; }
.topbar { display: flex; align-items: center; gap: 10px; padding: 10px 18px; }
.back-btn { width: 32px; height: 32px; border-radius: 10px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.back-btn i { font-size: 13px; color: white; }
.topbar-title { font-size: 16px; font-weight: 700; color: white; flex: 1; }

.content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 12px 16px 16px; gap: 14px; }

/* HEADER MSG */
.header-msg { text-align: center; color: white; }
.header-title { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
.header-sub { font-size: 12px; opacity: 0.85; line-height: 1.5; }

/* QR CARD */
.qr-card { background: white; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }

.qr-svg { width: 200px; height: 200px; }

.qr-info { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.qr-code-num { font-size: 11px; color: #7a8a7a; font-family: 'Courier New', monospace; letter-spacing: 1px; }
.qr-expires { font-size: 11px; color: #1D9E75; font-weight: 600; display: flex; align-items: center; gap: 5px; }
.qr-expires i { font-size: 11px; }

/* SUMMARY */
.qr-summary { width: 100%; background: #f0f8f4; border: 1px solid #9fd4b8; border-radius: 12px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.qr-summary-left { font-size: 12px; color: #1a2a1a; }
.qr-summary-left strong { color: #0d6e48; }
.qr-summary-pts { background: #1D9E75; color: white; font-size: 13px; font-weight: 800; padding: 5px 11px; border-radius: 10px; }

/* INSTRUCTION */
.show-cashier { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 12px; }
.show-cashier-icon { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.show-cashier-icon i { font-size: 17px; color: white; }
.show-cashier-text { font-size: 12px; color: white; line-height: 1.5; }
.show-cashier-text strong { font-weight: 700; }

/* WAITING DOT */
.waiting { display: flex; align-items: center; justify-content: center; gap: 8px; color: white; font-size: 13px; font-weight: 600; padding: 8px; }
.dot-pulse { width: 8px; height: 8px; border-radius: 50%; background: white; opacity: 0.85; }

/* CANCEL BTN */
.btn-cancel { width: 100%; background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.4); border-radius: 16px; padding: 12px 0; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: default; font-family: inherit; }
</style>
</head>
