<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCart – Escanear</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8ede8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; padding: 52px 0 20px; }
.screen-tag { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); background: #1a7a58; color: white; font-size: 11px; font-weight: 600; padding: 5px 16px; border-radius: 20px; white-space: nowrap; z-index: 100; }
.phone { width: 360px; height: 720px; background: #1a1a18; border-radius: 44px; border: 2px solid #c8d0c8; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 16px 48px rgba(0,0,0,0.13); position: relative; }
.statusbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 24px 2px; font-size: 11px; color: rgba(255,255,255,0.7); }
.notch { width: 68px; height: 14px; background: #0a0a08; border-radius: 0 0 10px 10px; margin: 0 auto; }

.topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px; }
.close-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
.close-btn i { color: white; font-size: 14px; }
.topbar-title { color: white; font-size: 15px; font-weight: 700; }
.flash-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
.flash-btn i { color: white; font-size: 14px; }

.camera-area { flex: 1; position: relative; background: #2a2a26; background-image: linear-gradient(135deg, #3a3a36 25%, #2a2a26 25%, #2a2a26 50%, #3a3a36 50%, #3a3a36 75%, #2a2a26 75%); background-size: 20px 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

.scan-frame { position: relative; width: 240px; height: 240px; }
.corner { position: absolute; width: 40px; height: 40px; border: 4px solid #1D9E75; }
.corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 12px 0 0 0; }
.corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 12px 0 0; }
.corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 12px; }
.corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 12px 0; }

.scan-line { position: absolute; left: 12px; right: 12px; top: 50%; height: 2px; background: linear-gradient(to right, transparent, #1D9E75, transparent); box-shadow: 0 0 12px #1D9E75; }

.fake-barcode { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 2px; opacity: 0.45; }
.fake-barcode span { display: block; background: white; width: 3px; height: 80px; }
.fake-barcode span:nth-child(2) { width: 1px; }
.fake-barcode span:nth-child(3) { width: 2px; height: 60px; }
.fake-barcode span:nth-child(4) { width: 4px; }
.fake-barcode span:nth-child(5) { width: 1px; height: 70px; }
.fake-barcode span:nth-child(6) { width: 3px; }
.fake-barcode span:nth-child(7) { width: 2px; height: 50px; }
.fake-barcode span:nth-child(8) { width: 5px; }
.fake-barcode span:nth-child(9) { width: 1px; }
.fake-barcode span:nth-child(10) { width: 3px; height: 75px; }
.fake-barcode span:nth-child(11) { width: 2px; }
.fake-barcode span:nth-child(12) { width: 4px; height: 65px; }
.fake-barcode span:nth-child(13) { width: 1px; }
.fake-barcode span:nth-child(14) { width: 3px; }
.fake-barcode span:nth-child(15) { width: 2px; height: 70px; }

.instruction { position: absolute; top: 90px; left: 0; right: 0; text-align: center; }
.instruction-text { display: inline-block; background: rgba(0,0,0,0.55); color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; }

.bottom-panel { padding: 16px; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 10px; }
.location-pill { background: rgba(29,158,117,0.25); border: 1px solid rgba(29,158,117,0.7); border-radius: 12px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
.location-pill i { font-size: 13px; color: #5dd4a4; }
.location-pill-text { color: white; font-size: 12px; }
.location-pill-text strong { color: #5dd4a4; }

.manual-btn { background: transparent; border: 1.5px solid rgba(255,255,255,0.35); border-radius: 14px; padding: 11px 0; color: white; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: default; font-family: inherit; }
</style>
</head>
<body>
<div class="screen-tag">2 — Escanear codigo de barras</div>
<div class="phone">
  <div class="statusbar"><span>9:42</span><div class="notch"></div><span>87%</span></div>
  <div class="topbar">
    <div class="close-btn"><i class="fa-solid fa-xmark"></i></div>
    <div class="topbar-title">Escanear producto</div>
    <div class="flash-btn"><i class="fa-solid fa-bolt"></i></div>
  </div>
  <div class="camera-area">
    <div class="instruction">
      <div class="instruction-text">Apunta al codigo de barras</div>
    </div>
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="fake-barcode">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="scan-line"></div>
    </div>
  </div>
  <div class="bottom-panel">
    <div class="location-pill">
      <i class="fa-solid fa-location-dot"></i>
      <div class="location-pill-text">Ubicacion verificada · <strong>Super Buen Precio</strong></div>
    </div>
    <div class="manual-btn"><i class="fa-solid fa-keyboard"></i> Ingresar codigo manualmente</div>
  </div>
</div>
</body>
</html>
