; PgBouncer — transaction pooling between API containers and PostgreSQL
; (README §2.7 Connection Pooling). Multiplexes many short-lived API
; connections onto a small server-side pool, preventing exhaustion.

[databases]
smartcart = host=postgres port=5432 dbname=smartcart

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — a server connection is returned to the pool at the end
; of each transaction (README §2.7). Required for Prisma's short transactions.
pool_mode = transaction
default_pool_size = 25
max_client_conn = 1000
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Prepared statements are not compatible with transaction pooling — Prisma must
; connect with `pgbouncer=true` so it disables them.
ignore_startup_parameters = extra_float_digits
