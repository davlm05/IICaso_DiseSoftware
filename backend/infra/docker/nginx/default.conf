# Nginx reverse proxy (README §2.5 Transport).
# Terminates TLS, enforces HTTPS + HSTS, proxies REST to the NestJS API and
# upgrades the Socket.IO WebSocket connection.

# Redirect all plain HTTP to HTTPS (301).
server {
    listen 80;
    server_name api.smartcart.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.smartcart.app;

    # Let's Encrypt certificates, auto-renewed via Certbot (README §2.5).
    ssl_certificate     /etc/letsencrypt/live/api.smartcart.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.smartcart.app/privkey.pem;

    # TLS 1.3 preferred; 1.2 accepted for legacy Android API < 26 (README §2.5).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # HSTS — 1 year, includeSubDomains, preload (README §2.5).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 2m;

    # REST API → NestJS.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO real-time validation status (README §2.8 Workflow 1 step 5).
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 600s;
    }
}
