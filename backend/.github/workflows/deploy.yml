# SmartCart — Backend deploy pipeline (README §2.9).
#
# Builds and publishes the api + analytics-worker container images on pushes to
# main, then runs a gated deploy. Registry/cluster credentials are provided as
# GitHub secrets; the deploy step is a structured placeholder for the target
# platform (Cloud Run / EKS / etc.).
name: Backend Deploy

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.CONTAINER_REGISTRY || 'ghcr.io' }}
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: backend/infra/docker/Dockerfile.api
          - name: analytics-worker
            dockerfile: backend/infra/docker/Dockerfile.worker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (gated)
    runs-on: ubuntu-latest
    needs: images
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Run database migrations
        run: echo "TODO: prisma migrate deploy against the production DATABASE_URL (from secrets)"
      - name: Roll out new images
        run: |
          echo "Deploying api + analytics-worker @ ${{ github.sha }}"
          echo "TODO: apply backend/infra/kubernetes manifests or trigger the target platform"
