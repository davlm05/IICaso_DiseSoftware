# SmartCart — Backend CI pipeline (README §2.9).
#
# Mirrors the pnpm scripts in backend/package.json. Each job is a quality gate;
# the same commands are run locally by the AI platform's `/release-feature`.
name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  quality:
    name: Lint, Types & Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm prisma:generate
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm type-check
      # --passWithNoTests: the backend currently ships source without *.spec.ts
      # files; remove the flag once specs land so missing tests fail the build.
      # (pnpm forwards trailing flags without a `--` separator.)
      - name: Unit tests
        run: pnpm test:unit --passWithNoTests
      - name: Contract tests
        run: pnpm test:contract --passWithNoTests

  integration:
    name: Integration (Postgres + Redis)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: smartcart
          POSTGRES_PASSWORD: smartcart
          POSTGRES_DB: smartcart
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U smartcart"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://smartcart:smartcart@localhost:5432/smartcart?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-change-me-min-32-chars!!
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me-min-32-chars!
      QR_SIGNING_SECRET: ci-qr-signing-secret-min-32-chars-long!!
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm prisma:generate
      - name: Sync schema to test database
        run: pnpm exec prisma db push --schema apps/api/prisma/schema.prisma --skip-generate
      - name: Integration tests
        run: pnpm test:integration --passWithNoTests

  build:
    name: Build & OpenAPI
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm prisma:generate
      - name: Build (api + worker)
        run: pnpm build
      - name: Validate OpenAPI spec
        run: pnpm openapi:validate
