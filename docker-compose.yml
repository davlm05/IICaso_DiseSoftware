# SmartCart — full local development ecosystem (Caso #2).
#
#   docker compose up -d
#
# Brings up the entire topology with a single command:
#   - backend stack (postgres, redis, pgbouncer, api, analytics-worker) — pulled
#     in unchanged from backend/infra/docker via `include`, so there is one
#     source of truth for those services.
#   - frontend (Expo web / Metro) dev container.
#   - orchestrator (the AI dev platform "devtools" container) that runs the
#     /feature, /build-feature, /validate-feature, /release-feature workflow.
#
# Each service installs its own dependencies on startup (Caso #2 §3) — no manual
# install step is required.
#
# Setup once:  cp .env.example .env  &&  cp backend/.env.example backend/.env
# then set ANTHROPIC_API_KEY (and optionally GH_TOKEN) in .env.

include:
  - backend/infra/docker/docker-compose.yml

services:
  # One-shot: materialize the Prisma schema into the fresh database so the API
  # has its tables on first boot. Runs `prisma db push` (no migration files yet),
  # then exits. The runtime API image is pruned to prod deps and has no Prisma
  # CLI, so we fetch it on the fly here against the mounted backend source.
  db-migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://smartcart:smartcart@postgres:5432/smartcart?schema=public
    command: >-
      sh -c "corepack enable &&
             npx --yes prisma@5.20.0 db push
               --schema apps/api/prisma/schema.prisma --skip-generate"
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # Wait for the schema push before the API starts (merges with the api service
  # defined in backend/infra/docker/docker-compose.yml).
  api:
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./platform
      dockerfile: docker/Dockerfile.frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - '8081:8081' # Metro / Expo web
      - '19006:19006' # Expo web (legacy)
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:3000/api/v1
    depends_on:
      - api

  orchestrator:
    build:
      context: ./platform
      dockerfile: docker/Dockerfile.orchestrator
    working_dir: /workspace/platform
    volumes:
      - .:/workspace # the whole repo: agents read/write code, run git
      - platform_node_modules:/workspace/platform/node_modules
      # Container-local, Linux-native node_modules so the release quality gates
      # resolve their tooling. These shadow the host's (Windows pnpm) installs,
      # which don't work cross-platform over a bind mount.
      - orch_backend_node_modules:/workspace/backend/node_modules
      - orch_frontend_node_modules:/workspace/frontend/node_modules
    environment:
      REPO_ROOT: /workspace
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Reuse the logged-in Claude session instead of an API key (see README).
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      AIDEV_AUTH_MODE: ${AIDEV_AUTH_MODE:-auto}
      GH_TOKEN: ${GH_TOKEN:-}
      AIDEV_MODEL: ${AIDEV_MODEL:-claude-opus-4-8}
      AIDEV_MODEL_LIGHT: ${AIDEV_MODEL_LIGHT:-claude-haiku-4-5-20251001}
      # Set AIDEV_OFFLINE=1 to run the deterministic scaffold strategy (no key).
      AIDEV_OFFLINE: ${AIDEV_OFFLINE:-0}
      # Install backend+frontend deps on startup so /release-feature gates run
      # in-container. Set to 0 for a faster boot (run gates on the host instead).
      AIDEV_INSTALL_APP_DEPS: ${AIDEV_INSTALL_APP_DEPS:-1}
      # Local-only release (branch + commit, no push/PR) so a containerized
      # /release-feature doesn't touch the remote and `git push` can't hang.
      AIDEV_SKIP_PR: ${AIDEV_SKIP_PR:-1}
      GIT_TERMINAL_PROMPT: '0'
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-aidev@smartcart.local}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-SmartCart AI Platform}
    # Idles after install+build; drive it with `docker compose exec`.
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
  platform_node_modules:
  orch_backend_node_modules:
  orch_frontend_node_modules:
