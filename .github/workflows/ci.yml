name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Todos los comandos se ejecutan dentro del proyecto frontend/.
defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Typecheck (tsc)
        run: pnpm run typecheck

      - name: Tests unitarios + cobertura (Vitest)
        run: pnpm run test:coverage

      - name: Build de producción (Vite)
        run: pnpm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Instalar navegador de Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke E2E del flujo principal
        run: pnpm run test:e2e
